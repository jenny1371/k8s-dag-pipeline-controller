apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-controller
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pipeline-controller-role
rules:
  # PipelineJob Resources
  - apiGroups: ["pipeline.io"]
    resources: ["pipelinejobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["pipeline.io"]
    resources: ["pipelinejobs/status"]
    verbs: ["get", "update", "patch"]

  # Node Resources（admission ）
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]

  # Pod（eviction ）
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]

  # batch Job
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # SparkApplication
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Events（controller-runtime ）
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pipeline-controller-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pipeline-controller-role
subjects:
  - kind: ServiceAccount
    name: pipeline-controller
    namespace: default