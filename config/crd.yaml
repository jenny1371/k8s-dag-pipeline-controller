apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pipelinejobs.pipeline.io
spec:
  group: pipeline.io
  names:
    kind: PipelineJob
    listKind: PipelineJobList
    plural: pipelinejobs
    singular: pipelinejob
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                dependencies:
                  type: array
                  items:
                    type: string
                priority:
                  type: string
                  enum: ["realtime", "batch"]
                requestCPU:
                  type: string
                requestMemory:
                  type: string
                storageMarker:
                  type: string
                timeoutSeconds:
                  type: integer
                jobDurationSeconds:
                  type: integer
                stage:
                  type: string
            status:
              type: object
              properties:
                state:
                  type: string
                evictionCount:
                  type: integer
                retryCount:
                  type: integer
                preemptible:
                  type: boolean
                lastUpdated:
                  type: string
      subresources:
        status: {}