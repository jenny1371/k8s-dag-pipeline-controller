apiVersion: pipeline.io/v1
kind: PipelineJob
metadata:
  name: batch-hog-1
  namespace: default
spec:
  priority: batch
  requestCPU: "3000m"
  requestMemory: "4Gi"
  storageMarker: "s3://test-bucket/hog1/_SUCCESS"
  timeoutSeconds: 300
